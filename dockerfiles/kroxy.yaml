listen: ":9092"
advertised: "kroxy:9092"

# Terminate TLS on the client-facing listener. Disabled here so the demo stack
# stays plaintext; mount a cert/key and enable to serve clients over TLS.
# tls:
#   enabled: true
#   cert_file: /etc/kroxy/certs/server.crt
#   key_file: /etc/kroxy/certs/server.key

upstream:
  bootstrap: "kafka:9093"
  # Authenticate PLAIN clients to the broker via SCRAM instead of forwarding
  # PLAIN verbatim. Omitted here so the demo stays PLAIN pass-through.
  # sasl:
  #   mechanism: SCRAM-SHA-256

resolver:
  type: memory
  memory:
    tenants:
      - id: tenantA
        topic_prefix: "tenantA."
        upstream: "kafka:9093"
      - id: tenantB
        topic_prefix: "tenantB."
        upstream: "kafka:9093"

log:
  level: info
  format: json

metrics:
  enabled: true
  listen: ":9090"

# WARNING: the admin RPC has no authentication in v1. Bind it to a loopback
# address in production, or otherwise gate access at the network layer.
# This compose stack publishes the port to the host for demo purposes.
admin:
  enabled: true
  listen: "0.0.0.0:9095"
