name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Cross-compile binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin arm64"
          )
          for t in "${targets[@]}"; do
            os="${t% *}"
            arch="${t#* }"
            out="kroxy-${VERSION}-${os}-${arch}"
            echo "==> building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION}" \
                -o "dist/${out}" ./cmd/kroxy
            tar -C dist -czf "dist/${out}.tar.gz" "${out}"
            rm "dist/${out}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
          ls -la dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
