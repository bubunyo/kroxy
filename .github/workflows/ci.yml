name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt drift in:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go vet (integration tag)
        run: go vet -tags=integration ./...
      - name: go mod tidy -diff
        run: go mod tidy -diff
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: go test (race)
        run: go test ./... -race -count=1

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: go test (integration, race)
        run: go test -tags=integration ./integration/... -race -count=1 -timeout=10m

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: make build
        run: make build
